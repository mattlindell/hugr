services:
  db:
    image: pgvector/pgvector:pg16
    container_name: claude-memory-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: memory
      POSTGRES_USER: claude
      POSTGRES_PASSWORD: memory_pass
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claude -d memory"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:0.24.0   # pinned (project policy); verified working with qwen2.5:7b @ num_ctx 16384 on 2026-06-01
    container_name: claude-memory-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11737:11434"   # 11737 avoids collision with a host-side Ollama installation (default 11434)
    environment:
      # Default served context for ALL models, including the OpenAI-compat /v1
      # path (which ignores per-request num_ctx). The bundled-runtime default of
      # 4096 silently truncated large behavioral-pass prompts; 16384 holds a
      # ~20k-char transcript + prompt + output. Option A: qwen2.5:7b @ 16k on an
      # 8GB GPU — may partially spill to CPU/RAM; acceptable for a background job.
      OLLAMA_CONTEXT_LENGTH: "16384"
      OLLAMA_KEEP_ALIVE: "10m"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      # Tests the HTTP API via bash /dev/tcp (ollama image ships no curl/wget/nc).
      # Probes /api/tags (model registry) rather than / so the check only goes
      # green once the daemon can actually serve model requests. FD 3 is explicitly
      # closed after the exchange. grep anchors on 'HTTP/1.' to avoid false matches.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/11434; printf \"GET /api/tags HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3; head -1 <&3 | grep -q \"HTTP/1\\.[01] 200\"; exec 3>&-'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # GPU is opt-in via docker-compose.gpu.yml (kept out of the base file so
    # `docker compose up` stays portable on non-NVIDIA hosts — Mac, GPU-less
    # Linux, Windows without passthrough). On those hosts the base file runs
    # ollama on CPU (slower but functional). To use the GPU:
    #   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
    # Some scripts (e.g. on Windows) can detect the NVIDIA runtime and apply the override automatically.

  mcp-server:
    build: ./mcp-server
    container_name: claude-memory-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:3333:3333"
    environment:
      DATABASE_URL: postgresql://claude:memory_pass@db:5432/memory
      # Default endpoint for pipeline scripts run via `docker compose run mcp-server`.
      # Reaches the in-stack ollama service over the compose network. The pipeline
      # also passes -e OLLAMA_URL explicitly; this is the fallback for bare runs.
      OLLAMA_URL: http://ollama:11434/v1
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
    volumes:
      - model_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3333/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    # NOTE: mcp-server depends only on the DB. It does NOT depend on ollama —
    # the server itself makes no LLM calls (distillation runs in ephemeral
    # `docker compose run` containers; search/recall need only Postgres).
    # Keeping ollama out of depends_on decouples lifecycles so ollama/GPU
    # changes don't cascade-recreate mcp-server and sever the MCP SSE session.
    depends_on:
      db:
        condition: service_healthy

volumes:
  model_cache:
  ollama_models:
